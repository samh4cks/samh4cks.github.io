---
layout: default
---

<h1 class="post-title">{{ page.title }}</h1>

<div id="post-content" style="{% if page.protected %}display:none{% endif %}">
  <article class="px-1">
    <div class="content">
      {{ content }}
    </div>
  </article>
</div>

{% if page.protected %}
<div id="lock-wrapper">
  <div class="lock-modal">

    <div class="icon">🔒</div>

    <h2>This post is locked</h2>
    <p>This content is protected. Enter the correct root flag to unlock it.</p>

    <input id="password-input" type="password" placeholder="Enter root flag">
    <button id="unlock-btn">Unlock</button>

    <p id="error-msg" style="display:none;color:#ff6b6b;"></p>

  </div>
</div>

<style>
#lock-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(10px);
  z-index: 9999;
}

.lock-modal {
  width: 380px;
  padding: 30px;
  border-radius: 16px;
  text-align: center;
  background: rgba(30, 30, 30, 0.9);
  backdrop-filter: blur(15px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

.lock-modal .icon {
  font-size: 42px;
  margin-bottom: 15px;
}

#password-input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #444;
  background: #1e1e1e;
  color: #fff;
  margin-bottom: 15px;
}

#unlock-btn {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  cursor: pointer;
}
</style>
{% endif %}

<script>
  const POST_ID = "{{ page.post_id }}";
</script>

<!-- 🔥 highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="{{ '/assets/js/unlock.js' | relative_url }}"></script>
